version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: csm_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: csm_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-csm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csm_password}
      POSTGRES_DB: ${POSTGRES_DB:-csm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.4
    container_name: csm_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,s3,sqs,secretsmanager,cloudwatch,lambda,iam
      DEBUG: 0
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  postgres_data:
  localstack_data:

networks:
  default:
    name: csm_network
